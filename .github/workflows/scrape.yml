name: Scrape Overwatch Patch Notes

on:
  schedule:
    - cron: '0 12 * * *' # Se ejecuta automáticamente todos los días a las 12:00 UTC (14:00 hora de España)
  workflow_dispatch: # Permite que ejecutes el scraper manualmente desde el panel de GitHub en cualquier momento

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Permiso crucial para que el bot pueda subir los JSON modificados al repositorio
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install scraper dependencies
        run: npm run install-deps

      - name: Run scraper
        run: node scraper/scraper.js

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          
          # Solo hacer commit y push si hay archivos JSON nuevos o modificados
          if ! git diff --cached --quiet; then
            git commit -m "chore: actualizar notas de parche y traducciones [skip ci]"
            git push
          else
            echo "No se detectaron nuevos parches. Todo actualizado."
          fi
