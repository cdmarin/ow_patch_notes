<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overwatch — Notas de Parche</title>
    <meta name="description"
        content="Notas de parche de Overwatch con visualización premium. Stadium, juego base, héroes y más.">
    <meta property="og:title" content="Overwatch — Notas de Parche">
    <meta property="og:description" content="Visualización de los parches de Overwatch">

    <!-- Favicon Overwatch-->
    <link rel="icon" href="logo.svg">

    <link rel="stylesheet" href="style.css?v=3">
</head>

<body>

    <!-- Scroll Progress Bar -->
    <div id="progress-bar" role="progressbar" aria-label="Progreso de lectura"></div>

    <!-- Loading Overlay -->
    <div id="loading-overlay" role="status" aria-live="polite">
        <img class="loader-logo" src="logo.svg" alt="Overwatch" draggable="false">
        <div class="loader-text">Cargando parche...</div>
        <div class="loader-bar">
            <div class="loader-bar-inner"></div>
        </div>
    </div>

    <!-- Scrape Progress Overlay -->
    <div id="scrape-overlay" class="hidden" role="status" aria-live="polite">
        <div class="scrape-card">
            <div class="scrape-header">
                <img class="scrape-logo" src="logo.svg" alt="Overwatch" draggable="false">
                <div class="scrape-title-group">
                    <div class="scrape-title">Actualizando Notas de Parche</div>
                    <div class="scrape-subtitle">Ejecutando proceso de descarga de parches y traductor automático...
                    </div>
                </div>
            </div>

            <div class="scrape-body">
                <div class="scrape-progress-container">
                    <div class="scrape-progress-bar">
                        <div class="scrape-progress-inner" id="scrape-progress-inner"></div>
                    </div>
                    <span class="scrape-percent" id="scrape-percent">0%</span>
                </div>

                <div class="scrape-console" id="scrape-console">
                    <!-- Los logs se escribirán aquí en tiempo real -->
                </div>
            </div>

            <div class="scrape-footer hidden" id="scrape-footer">
                <button id="scrape-close-btn" class="scrape-btn">Aceptar</button>
            </div>
        </div>
    </div>


    <!-- Header -->
    <header role="banner">
        <div class="header-brand">
            <img class="header-logo" src="logo.svg" alt="Overwatch Logo" draggable="false">
            <span class="header-title">Overwatch Patch Notes</span>
        </div>

        <!-- Patch Selector -->
        <div class="patch-selector-wrap">
            <select id="patch-select" aria-label="Seleccionar parche">
                <option>Cargando...</option>
            </select>
            <button id="refresh-btn" class="refresh-btn" title="Refrescar y forzar descarga completa del parche actual"><span
                    class="refresh-icon">🔄</span></button>
            <button id="update-btn" class="refresh-btn" title="Buscar nuevos parches (descarga y traduce solo lo nuevo)"><span
                    class="refresh-icon">📥</span></button>
        </div>

        <!-- Search -->
        <div class="search-wrap" role="search">
            <span class="search-icon" aria-hidden="true">🔍</span>
            <input id="search-input" type="search" placeholder="Buscar héroe..." autocomplete="off"
                aria-label="Buscar héroe">
        </div>

        <!-- Filters -->
        <div class="filter-wrap" role="group" aria-label="Filtrar por tipo de cambio">
            <button class="filter-chip" data-filter="buff" id="filter-buff" aria-pressed="false">
                <span>⬆</span> Buff
            </button>
            <button class="filter-chip" data-filter="nerf" id="filter-nerf" aria-pressed="false">
                <span>⬇</span> Nerf
            </button>
            <button class="filter-chip" data-filter="new" id="filter-new" aria-pressed="false">
                <span>✦</span> Nuevo
            </button>
            <button class="filter-chip" data-filter="rework" id="filter-rework" aria-pressed="false">
                <span>↻</span> Rework
            </button>
        </div>

        <!-- Theme Toggle -->
        <button id="theme-toggle-btn" class="theme-toggle-btn" title="Cambiar tema" aria-label="Cambiar tema">
            <span class="theme-icon">☀️</span>
        </button>
    </header>

    <!-- App Layout -->
    <div class="app-layout">
        <!-- Sidebar -->
        <nav class="sidebar" id="sidebar" role="navigation" aria-label="Navegación de secciones">
            <!-- Injected by app.js -->
        </nav>

        <!-- Main Content -->
        <main class="content" id="content" role="main">
            <!-- Injected by app.js -->
        </main>
    </div>

    <script>
        // Inline theme handler — runs immediately, independent of module loading
        (function() {
            function applyTheme(isLight) {
                document.body.classList.toggle('light-theme', isLight);
                var icon = document.querySelector('#theme-toggle-btn .theme-icon');
                if (icon) icon.textContent = isLight ? '🌙' : '☀️';
                // Swap logos (exclude header logo)
                document.querySelectorAll('img').forEach(function(img) {
                    if ((img.classList.contains('loader-logo') || img.classList.contains('scrape-logo') ||
                         img.src.indexOf('logo.svg') !== -1 || img.src.indexOf('logo-light.svg') !== -1) &&
                        !img.classList.contains('header-logo')) {
                        img.src = isLight ? 'logo-light.svg' : 'logo.svg';
                    }
                });
            }

            // Apply saved theme immediately
            try {
                var saved = localStorage.getItem('theme');
                if (saved === 'light') applyTheme(true);
            } catch(e) {}

            // Attach click handler
            var btn = document.getElementById('theme-toggle-btn');
            if (btn) {
                btn.addEventListener('click', function() {
                    var isLight = !document.body.classList.contains('light-theme');
                    try { localStorage.setItem('theme', isLight ? 'light' : 'dark'); } catch(e) {}
                    applyTheme(isLight);
                });
            }
        })();
    </script>
    <script type="module" src="app.js?v=3"></script>
</body>

</html>
